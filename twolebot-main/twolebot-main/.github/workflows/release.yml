name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: twolebot
            archive: twolebot-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: twolebot
            archive: twolebot-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: twolebot
            archive: twolebot-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: twolebot
            archive: twolebot-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lamdera
        run: |
          curl -L https://static.lamdera.com/bin/lamdera-1.3.2-linux-x86_64 -o lamdera
          chmod +x lamdera
          sudo mv lamdera /usr/local/bin/
        if: runner.os == 'Linux'

      - name: Install Lamdera (macOS)
        run: |
          curl -L https://static.lamdera.com/bin/lamdera-1.3.2-macos-x86_64 -o lamdera
          chmod +x lamdera
          sudo mv lamdera /usr/local/bin/
        if: runner.os == 'macOS'

      - name: Build Elm frontend
        run: |
          cd frontend
          lamdera make src/Main.elm --output=dist/elm.js --optimize
          cp index.html dist/

      - name: Build Rust (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Rust (cross-compile ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          cp -r frontend/dist release/frontend
          cd release
          tar -czvf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: twolebot ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
          body: |
            ## Installation

            **One-liner install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **Manual download:**
            - Linux x86_64: `twolebot-linux-x86_64.tar.gz`
            - Linux ARM64: `twolebot-linux-arm64.tar.gz`
            - macOS x86_64: `twolebot-macos-x86_64.tar.gz`
            - macOS ARM64 (Apple Silicon): `twolebot-macos-arm64.tar.gz`

            ## Quick Start

            1. Run `twolebot` - opens setup wizard in browser
            2. Follow the steps to configure Telegram and Gemini
            3. Restart twolebot to begin

            ## What's New

            See commits for changes.
