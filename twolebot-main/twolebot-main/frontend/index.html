<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twolebot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="/elm.js"></script>
    <!-- elm-pkg-js modules (https://github.com/supermario/elm-pkg-js) -->
    <script src="/elm-pkg-js/voice-recording.js"></script>
    <script src="/elm-pkg-js/video-recording.js"></script>
    <script src="/elm-pkg-js/file-attachment.js"></script>
    <script src="/elm-pkg-js/chat-ws.js"></script>
    <script src="/elm-pkg-js/ui-helpers.js"></script>
    <script src="/elm-pkg-js/qr-svg.js"></script>
    <script>
        var app = Elm.Main.init({
            node: document.getElementById('app')
        });

        if (app.ports && app.ports.logWarning) {
            app.ports.logWarning.subscribe(function(msg) { console.warn(msg); });
        }

        var modules = window.elmPkgJs || {};
        Object.keys(modules).forEach(function(name) {
            try {
                modules[name].init(app);
            } catch(e) {
                console.error('elm-pkg-js [' + name + ']: init failed', e);
            }
        });
    </script>
</body>
</html>
